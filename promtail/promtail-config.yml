server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fashion-monitor
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only compose services labeled for log shipping.
      - source_labels: [__meta_docker_container_label_fm_logging]
        regex: "true"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      # Pino JSON lines on stdout
      - json:
          expressions:
            level: level
            scope: scope
            event: event
            runId: runId
            requestId: requestId
            profileId: profileId
            platform: platform
            queryId: queryId
      - labels:
          level:
          scope:
          event:
          service:
