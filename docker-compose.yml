x-log-shipping-labels: &log-shipping-labels
  fm.logging: "true"

services:
  scraper:
    image: fashion-monitor/cli
    build: .
    command: ["node", "apps/cli/dist/run.js", "--config", "/data/config.yaml"]
    labels:
      <<: *log-shipping-labels
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: "no"

  poshmark:
    image: fashion-monitor/cli
    build: .
    command: ["node", "apps/cli/dist/run.js", "--config", "/data/config.yaml", "--platforms", "poshmark"]
    labels:
      <<: *log-shipping-labels
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: "no"

  feedback-bot:
    image: fashion-monitor/cli
    build: .
    profiles: ["feedback"]
    command: ["node", "apps/cli/dist/feedback-bot.js", "--config", "/data/config.yaml"]
    labels:
      <<: *log-shipping-labels
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    command: serve
    environment:
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-lib:/var/lib/ntfy
    ports:
      - "${NTFY_PORT:-8282}:80"
    restart: unless-stopped

  dashboard:
    image: fashion-monitor/cli
    build: .
    command:
      [
        "node",
        "apps/cli/dist/dashboard.js",
        "--config",
        "/data/config.yaml",
        "--host",
        "0.0.0.0",
        "--port",
        "3030",
      ]
    labels:
      <<: *log-shipping-labels
    environment:
      # No reverse proxy in front on this host — served plain HTTP on the LAN.
      # Set to "true" if this is ever put behind a TLS-terminating proxy.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
    volumes:
      - ./data:/data
    env_file:
      - .env
    ports:
      - "3030:3030"
    restart: unless-stopped

  mcp-server:
    image: fashion-monitor/mcp-server
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    environment:
      MCP_PORT: ${MCP_PORT:-3102}
      MCP_CONFIG_PATH: /data/config.yaml
      DB_PATH: /data/fashion_monitor.db
    ports:
      - "${MCP_PORT:-3102}:${MCP_PORT:-3102}"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped

  dashboard-report:
    image: fashion-monitor/cli
    build: .
    profiles: ["tools"]
    command: ["node", "apps/cli/dist/report.js", "--config", "/data/config.yaml"]
    volumes:
      - ./data:/data

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_INSTALL_PLUGINS: frser-sqlite-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data:/data:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    profiles: ["loki"]
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    profiles: ["loki"]
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  grafana-data:
  loki-data:
  ntfy-cache:
  ntfy-lib:
